<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - Student AI</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="auth">
      <h2>Login</h2>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" name="email" required />
        <label>Password</label>
        <input type="password" name="password" required />
        <button type="submit">Login</button>
      </form>
      <p>New? <a href="/signup">Create an account</a></p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {email: form.email.value, password: form.password.value};
      const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
      if (res.ok) location.href = '/'; else alert('Login failed');
    });
    </script>
  </body>
  </html>
